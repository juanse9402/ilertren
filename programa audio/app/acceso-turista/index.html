<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Tour Vitoria</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        
        <!-- Language Selection Screen -->
        <div id="languageScreen" class="tourist-screen active">
            <header>
                <h1>Selecciona tu idioma</h1>
                <p>Select your language / Choisissez votre langue</p>
            </header>
            
            <div class="language-grid">
                <button class="lang-btn" data-lang="es">
                    <span class="flag">🇪🇸</span>
                    <span class="lang-name">Español</span>
                </button>
                <button class="lang-btn" data-lang="en">
                    <span class="flag">🇬🇧</span>
                    <span class="lang-name">English</span>
                </button>
                <button class="lang-btn" data-lang="fr">
                    <span class="flag">🇫🇷</span>
                    <span class="lang-name">Français</span>
                </button>
            </div>
        </div>

        <!-- Main Tour Screen -->
        <div id="tourScreen" class="tourist-screen hidden">
            <header>
                <div style="display:flex; justify-content:space-between; width:100%;">
                    <div class="status-indicator">
                        <span class="dot" id="gpsDot"></span>
                        <span id="gpsStatus">Buscando GPS...</span>
                    </div>
                    <button id="btnChangeLang" class="btn outline small">🌐 Idioma</button>
                </div>
            </header>

            <main>
                <div class="image-container">
                    <img id="stopImage" src="https://via.placeholder.com/400x250/1e293b/ef4444?text=Bienvenido" alt="Lugar">
                </div>

                <div class="info-card">
                    <h2 id="currentStopLabel">Punto Actual</h2>
                    <h3 id="currentStopName">--</h3>
                    <div class="distance-badge">
                        <span id="distanceValue">--</span> m
                    </div>
                </div>

                <div class="controls">
                    <button id="btnPlay" class="btn primary">
                        <span class="icon">▶</span> Iniciar Tour
                    </button>
                    <button id="btnPause" class="btn secondary hidden">
                        <span class="icon">⏸</span> Pausar Tour
                    </button>
                </div>
            </main>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>
    <script src="tourist.js"></script>
</body>
</html>
